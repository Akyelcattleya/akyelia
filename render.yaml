# AkyelIA - Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

databases:
  - name: akyelia-db
    databaseName: akyelia
    plan: free
    ipAllowList: []

services:
  - type: web
    name: akyelia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120 --forwarded-allow-ips '*'
    envVars:
      - key: PORT
        value: 10000
      - key: DEFAULT_PROVIDER
        value: "openrouter"
      - key: DB_PATH
        value: "/data/akyelia.db"
      - key: API_KEYS_FILE
        value: "/data/api_keys.json"
      - key: PYTHON_VERSION
        value: "3.12"

      # 🔗 Connexion PostgreSQL (créé automatiquement par Render)
      - key: DATABASE_URL
        fromDatabase:
          name: akyelia-db
          property: connectionString

      # 🌐 OpenRouter (200+ modèles, une seule clé)
      - key: OPENROUTER_API_KEY
        sync: false

      # 🟢 NVIDIA NIM (API gratuite pour le développement)
      - key: NVIDIA_API_KEY
        sync: false

      # 🧠 DeepSeek
      - key: DEEPSEEK_API_KEY
        sync: false

      # ✨ OpenAI / ChatGPT
      - key: OPENAI_API_KEY
        sync: false

      # 🟣 Anthropic Claude
      - key: ANTHROPIC_API_KEY
        sync: false

      # 🔵 Google Gemini (gratuit !)
      - key: GEMINI_API_KEY
        sync: false

      # ⚡ Groq (inference ultra-rapide, gratuit)
      - key: GROQ_API_KEY
        sync: false

      # 🇨🇳 Kimi / Moonshot
      - key: KIMI_API_KEY
        sync: false

      # 🔮 Mistral AI
      - key: MISTRAL_API_KEY
        sync: false

      # 🟡 Perplexity AI
      - key: PERPLEXITY_API_KEY
        sync: false

      # 🎯 xAI / Grok
      - key: XAI_API_KEY
        sync: false

      # 🤝 Together AI
      - key: TOGETHER_API_KEY
        sync: false

      # 🟠 OpenClaude Gateway (Gitlawb Opengateway)
      - key: OPENCLAUDE_API_KEY
        sync: false
